<!DOCTYPE html>
<html lang="it" data-theme="light" data-font-size="medium" data-meal-border="neutral">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dieta Simone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Roboto:ital,wght@0,400;0,500;1,700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>

<body>
    <header class="app-header position-sticky top-0 start-0 pt-2">
        <h1 class="text-center fw-bold" id="app-title">Dieta Simone</h1>
        <div class="calendar-panel">
        <div class="ctas d-flex justify-content-between">
            <div class="lx d-flex gap-3">
                <button class="btn btn-primary" id="prev-day" type="button" aria-label="Giorno precedente"><svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="20"
                    height="20" fill="currentColor" class="bi bi-arrow-left" viewBox="0 0 16 16">
                    <path fill-rule="evenodd"
                        d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z" />
                </svg></button>
                <button class="btn btn-primary" id="next-day" type="button" aria-label="Giorno successivo"><svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="20"
                        height="20" fill="currentColor" class="bi bi-arrow-right" viewBox="0 0 16 16">
                        <path fill-rule="evenodd"
                            d="M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8z" />
                    </svg></button>
            </div>
            <div class="rx"><button class="btn btn-light" id="today" type="button">Oggi</button></div>
        </div>
        <div class="title p-2">
            <h2 class="text-center fw-bold" id="date"></h2>
            <p class="text-center mb-0" id="week-number"></p>
        </div>
        <nav class="week-navigation" id="week-strip" aria-label="Seleziona un giorno della settimana"></nav>
        <div class="app-toolbar" aria-label="Visualizzazione e ricerca">
            <div class="view-switch" role="group" aria-label="Visualizzazione del piano">
                <button class="view-switch-button is-active" id="day-view" type="button" aria-pressed="true">Giorno</button>
                <button class="view-switch-button" id="week-view" type="button" aria-pressed="false">Settimana</button>
            </div>
            <div class="toolbar-actions">
                <button class="search-toggle" id="search-toggle" type="button" aria-expanded="false" aria-controls="search-panel">
                    <span aria-hidden="true">🔍</span> Cerca
                </button>
                <button class="settings-toggle" id="settings-toggle" type="button" aria-label="Apri impostazioni">
                    <span aria-hidden="true">⚙️</span><span class="settings-label"> Impostazioni</span>
                </button>
            </div>
        </div>
        </div>
    </header>
    <section class="app-content mt-2 mb-5 container-sm">
        <section class="search-panel" id="search-panel" aria-label="Ricerca nel piano" hidden>
            <label class="form-label fw-bold" for="meal-search">Cerca un alimento o un pasto</label>
            <div class="search-field-row">
                <input class="form-control" id="meal-search" type="search" placeholder="Ad esempio: salmone, yogurt, pizza" autocomplete="off">
                <button class="btn btn-outline-secondary" id="close-search" type="button" aria-label="Chiudi ricerca">×</button>
            </div>
            <p class="search-summary" id="search-summary" aria-live="polite"></p>
            <div class="search-results" id="search-results"></div>
        </section>
        <div id="status" role="status" aria-live="polite"></div>
        <div id="meal-plan"></div>
    </section>
    <dialog class="settings-dialog" id="settings-dialog" aria-labelledby="settings-title">
        <form id="settings-form">
            <div class="settings-heading">
                <h2 id="settings-title">Personalizza l'app</h2>
                <button class="dialog-close" id="close-settings" type="button" aria-label="Chiudi impostazioni">×</button>
            </div>

            <label class="form-label" for="plan-name">Nome del piano</label>
            <input class="form-control" id="plan-name" name="planName" type="text" maxlength="40">

            <label class="form-label" for="plan-start-date">Inizio della settimana 1</label>
            <input class="form-control" id="plan-start-date" name="startDate" type="date" required>
            <p class="setting-help">Questa data corrisponde al primo giorno della prima settimana.</p>

            <label class="form-label" for="theme-select">Tema</label>
            <select class="form-select" id="theme-select" name="theme">
                <option value="auto">Automatico</option>
                <option value="light">Chiaro</option>
                <option value="dark">Scuro</option>
            </select>

            <label class="form-label" for="font-size-select">Dimensione del testo</label>
            <select class="form-select" id="font-size-select" name="fontSize">
                <option value="small">Piccola</option>
                <option value="medium">Normale</option>
                <option value="large">Grande</option>
            </select>

            <label class="form-label" for="primary-color">Colore principale</label>
            <div class="color-setting">
                <input id="primary-color" name="primaryColor" type="color" aria-label="Colore principale">
                <output id="primary-color-value" for="primary-color"></output>
            </div>

            <label class="form-label" for="meal-border-select">Colore secondario</label>
            <select class="form-select" id="meal-border-select" name="mealBorder">
                <option value="neutral">Neutro</option>
                <option value="primary">Come il colore principale</option>
            </select>

            <div class="settings-actions">
                <button class="btn btn-outline-secondary" id="reset-settings" type="button">Ripristina</button>
                <button class="btn btn-primary" type="submit">Salva</button>
            </div>
        </form>
    </dialog>
    <script src="diet_plan_data.js"></script>
    <script src="main.js"></script>
</body>

</html>
